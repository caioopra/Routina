name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://planner:planner@localhost:5432/planner
  SQLX_OFFLINE: "true"

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner
          POSTGRES_DB: planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo (Rust-aware)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true
          cache-all-crates: true

      - name: Check formatting
        working-directory: backend
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: backend
        run: cargo clippy -- -D warnings

      - name: Install sqlx-cli (cached)
        run: command -v sqlx >/dev/null 2>&1 || cargo install sqlx-cli --version ^0.8 --no-default-features --features native-tls,postgres --locked

      - name: Apply migrations
        working-directory: backend
        run: sqlx migrate run

      - name: Verify sqlx offline metadata matches live schema
        working-directory: backend
        run: cargo sqlx prepare --workspace --check -- --all-targets
        env:
          SQLX_OFFLINE: "false"

      - name: Run tests
        working-directory: backend
        run: cargo test
        env:
          DATABASE_URL: postgres://planner:planner@localhost:5432/planner

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check formatting
        working-directory: frontend
        run: npx prettier --check 'src/**/*.{js,jsx,ts,tsx,css,json}'

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build
